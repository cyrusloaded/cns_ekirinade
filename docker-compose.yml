services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: cns_user
      POSTGRES_PASSWORD: cns_password
      POSTGRES_DB: cns_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cns_user -d cns_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrator:
    build:
      context: .
      target: migrator
    environment:
      - DATABASE_URL=postgresql://cns_user:cns_password@db:5432/cns_db
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  app:
    build:
      context: .
      target: runner
    restart: always
    environment:
      - DATABASE_URL=postgresql://cns_user:cns_password@db:5432/cns_db
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config:
