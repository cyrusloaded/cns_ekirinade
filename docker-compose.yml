version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: cns_user
      POSTGRES_PASSWORD: cns_password
      POSTGRES_DB: cns_db
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    restart: always
    environment:
      # Use the docker-compose network to connect to the db service
      - DATABASE_URL=postgresql://cns_user:cns_password@db:5432/cns_db?schema=public
    depends_on:
      - db

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config:
